name: 'Check changes ownership'
on:
  pull_request_target:
    types: [opened, synchronize, edited, labeled, unlabeled]
    branches: [ 'main' ]
    paths:
      - 'model/**'

permissions:
  contents: read

jobs:
  get-changed-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      changed_files: ${{ steps.changed-files.outputs.changed_files }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      # Determine the changed directories under model/ from the GitHub API.
      # This intentionally does NOT check out the (untrusted) fork PR code:
      # this workflow runs in the trusted "pull_request_target" context, so
      # fetching and executing fork code here would be a "pwn request" risk.
      - name: Get changed model directories
        id: changed-files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          changed_files=$(gh api --paginate \
            "repos/${REPO}/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename' \
            | sed -n 's|^\(model/[^/][^/]*\)/.*|\1|p' \
            | sort -u \
            | paste -sd, -)
          echo "changed_files=${changed_files}" >> "$GITHUB_OUTPUT"
          if [ -n "${changed_files}" ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

  validate-area-ownership:
    runs-on: ubuntu-latest
    needs: get-changed-files
    permissions:
      contents: read
      pull-requests: write
    if: ${{ needs.get-changed-files.outputs.any_changed == 'true' && github.repository_owner == 'open-telemetry' }}
    steps:
      # Checkout the base branch (main, secure context)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      # uses node 22 to be able to use Typescript
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'npm'
          cache-dependency-path: |
            .github/scripts/triage/package-lock.json
          node-version: '24'

      - name: Install script dependencies
        working-directory: .github/scripts/triage
        run: npm ci --ignore-scripts

      - name: Validate if PR has active owners
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_FILES: ${{ needs.get-changed-files.outputs.changed_files }}
        run: node .github/scripts/triage/check-changes-ownership.ts
