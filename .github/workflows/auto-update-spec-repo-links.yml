name: Auto-update spec repo links
on:
  schedule:
    # hourly at minute 46
    - cron: "46 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'open-telemetry'
    outputs:
      latest-version: ${{ steps.check-versions.outputs.latest-version }}
      already-opened: ${{ steps.check-versions.outputs.already-opened }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - id: check-versions
        name: Check versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_version=$(gh release view \
                               --repo open-telemetry/opentelemetry-specification \
                               --json tagName \
                               --jq .tagName)

          matches=$(gh pr list \
                        --author otelbot[bot] \
                        --state open \
                        --search "in:title \"Update spec repo links to $latest_version\"")
          if [ ! -z "$matches" ]
          then
            already_opened=true
          fi

          echo "latest-version=$latest_version" >> $GITHUB_OUTPUT
          echo "already-opened=$already_opened" >> $GITHUB_OUTPUT

  update-spec-repo-links:
    permissions:
      contents: write # required for pushing changes
    runs-on: ubuntu-latest
    if: |
      needs.check-versions.outputs.already-opened != 'true'
    needs:
      - check-versions
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Use CLA approved github bot
        run: .github/scripts/use-cla-approved-github-bot.sh

      - name: Update version
        env:
          VERSION: ${{ needs.check-versions.outputs.latest-version }}
        run: .github/scripts/update-spec-repo-links.sh $VERSION

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_CLIENT_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Create pull request
        env:
          VERSION: ${{ needs.check-versions.outputs.latest-version }}
          GITHUB_TOKEN: ${{ github.token }}
          # Use the App token for PR creation so the pull request runs workflows.
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
        run: |
          message="Update spec repo links to $VERSION"
          body="Update spec repo links to \`$VERSION\`."
          branch="otelbot/update-spec-repo-links-to-$VERSION"

          git checkout -b $branch
          git commit -a -m "$message"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" $branch
          gh pr create --title "[chore] $message" \
                       --body "$body" \
                       --head "$branch" \
                       --base main
