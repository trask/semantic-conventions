templates:
  - pattern: areas.md.j2
    filter: >
      semconv_grouped_attributes({"v2": true, "exclude_deprecated": true}) | map(.root_namespace)
    application_mode: single
whitespace_control:
  trim_blocks: true
  lstrip_blocks: true
  keep_trailing_newline: true
text_maps:
  areas:
    az: azure
    hw: hardware
    oracle: oracledb
