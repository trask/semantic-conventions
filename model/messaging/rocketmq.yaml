file_format: definition/2

attribute_groups:
  # RocketMQ attributes shared by all RocketMQ spans.
  - id: messaging.rocketmq.attributes.common
    visibility: internal
    attributes:
      - ref: messaging.destination.name
        examples: ['MyTopic']
      - ref: messaging.rocketmq.namespace
        requirement_level: required
      - ref: messaging.rocketmq.message.group
        requirement_level:
          conditionally_required: If the message type is FIFO.
      - ref: messaging.rocketmq.message.type
      - ref: messaging.rocketmq.message.tag
      - ref: messaging.rocketmq.message.keys

span_refinements:
  - id: span.messaging.rocketmq.send.producer
    ref: messaging.send.producer
    stability: development
    brief: Describes a producer sending one or more messages to Apache RocketMQ.
    attributes:
      - ref: messaging.system
        note: MUST be set to `"rocketmq"`.
        examples: ['rocketmq']
      - ref: error.type
        examples: ['TOPIC_NOT_EXIST', 'SERVICE_NOT_AVAILABLE', 'SYSTEM_BUSY']
      - ref_group: messaging.rocketmq.attributes.common
      - ref: messaging.rocketmq.message.delivery_timestamp
        requirement_level:
          conditionally_required: If the message type is delay and delay time level is not specified.
      - ref: messaging.rocketmq.message.delay_time_level
        requirement_level:
          conditionally_required: If the message type is delay and delivery timestamp is not specified.

  - id: span.messaging.rocketmq.receive.client
    ref: messaging.receive.client
    stability: development
    brief: Describes a consumer receiving one or more messages from Apache RocketMQ (pull-based).
    attributes:
      - ref: messaging.system
        note: MUST be set to `"rocketmq"`.
        examples: ['rocketmq']
      - ref: error.type
        examples: ['TOPIC_NOT_EXIST', 'SERVICE_NOT_AVAILABLE', 'SYSTEM_BUSY']
      - ref_group: messaging.rocketmq.attributes.common
      - ref: messaging.consumer.group.name
        brief: &rocketmq_consumer_group_brief "RocketMQ [consumer group name](https://rocketmq.apache.org/docs/domainModel/08consumergroup/)."
        note: ""
        requirement_level: required
        sampling_relevant: true
      - ref: messaging.rocketmq.consumption_model

  - id: span.messaging.rocketmq.process.consumer
    ref: messaging.process.consumer
    stability: development
    brief: Describes a consumer processing one or more messages from Apache RocketMQ (push-based).
    attributes:
      - ref: messaging.system
        note: MUST be set to `"rocketmq"`.
        examples: ['rocketmq']
      - ref: error.type
        examples: ['TOPIC_NOT_EXIST', 'SERVICE_NOT_AVAILABLE', 'SYSTEM_BUSY']
      - ref_group: messaging.rocketmq.attributes.common
      - ref: messaging.consumer.group.name
        brief: *rocketmq_consumer_group_brief
        note: ""
        requirement_level: required
        sampling_relevant: true
      - ref: messaging.rocketmq.consumption_model
