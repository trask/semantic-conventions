file_format: definition/2

attribute_groups:
  # Amazon SQS attributes shared by all SQS spans.
  - id: messaging.aws.sqs.attributes.common
    visibility: internal
    attributes:
      - ref: messaging.destination.name
        examples: ['MyQueue']
      - ref: aws.sqs.queue.url
      - ref: aws.request_id

span_refinements:
  - id: span.messaging.aws.sqs.send.producer
    ref: messaging.send.producer
    stability: development
    brief: Describes a producer sending one or more messages to Amazon SQS.
    attributes:
      - ref: messaging.system
        note: MUST be set to `"aws_sqs"`.
        examples: ['aws_sqs']
      - ref: error.type
        examples: ['AWS.SimpleQueueService.NonExistentQueue', 'OverLimit', 'RequestThrottled']
      - ref_group: messaging.aws.sqs.attributes.common

  - id: span.messaging.aws.sqs.receive.client
    ref: messaging.receive.client
    stability: development
    brief: Describes a consumer receiving one or more messages from Amazon SQS (pull-based).
    attributes:
      - ref: messaging.system
        note: MUST be set to `"aws_sqs"`.
        examples: ['aws_sqs']
      - ref: error.type
        examples: ['AWS.SimpleQueueService.NonExistentQueue', 'OverLimit', 'RequestThrottled']
      - ref_group: messaging.aws.sqs.attributes.common

  - id: span.messaging.aws.sqs.process.consumer
    ref: messaging.process.consumer
    stability: development
    brief: Describes a consumer processing one or more messages from Amazon SQS (push-based).
    attributes:
      - ref: messaging.system
        note: MUST be set to `"aws_sqs"`.
        examples: ['aws_sqs']
      - ref: error.type
        examples: ['AWS.SimpleQueueService.NonExistentQueue', 'OverLimit', 'RequestThrottled']
      - ref_group: messaging.aws.sqs.attributes.common

  # Amazon SNS
  - id: span.messaging.aws.sns.send.producer
    ref: messaging.send.producer
    stability: development
    brief: Describes a producer publishing one or more messages to Amazon SNS.
    attributes:
      - ref: messaging.system
        note: MUST be set to `"aws.sns"`.
        examples: ['aws.sns']
      - ref: error.type
        examples: ['AuthorizationError', 'EndpointDisabled', 'Throttled']
      - ref: messaging.destination.name
        examples: ['MyTopic']
      - ref: aws.sns.topic.arn
      - ref: aws.request_id
