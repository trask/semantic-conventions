file_format: definition/2

span_refinements:
  - id: span.messaging.gcp_pubsub.create.producer
    ref: messaging.create.producer
    stability: development
    brief: Describes a message being created for publishing to Google Cloud Pub/Sub.
    attributes:
      - ref: messaging.system
        note: MUST be set to `"gcp_pubsub"`.
        examples: ['gcp_pubsub']
      - ref: error.type
        examples: ['NOT_FOUND', 'RESOURCE_EXHAUSTED', 'UNAVAILABLE']
      - ref: messaging.destination.name
        examples: ['MyTopic']
      - ref: messaging.gcp_pubsub.message.ordering_key
        requirement_level:
          conditionally_required: If the message type has an ordering key set.
      - ref: messaging.operation.name
        note: SHOULD be set to `create`.
        examples: ['create']

  - id: span.messaging.gcp_pubsub.send.producer
    ref: messaging.send.producer
    stability: development
    brief: Describes a producer publishing one or more messages to Google Cloud Pub/Sub.
    attributes:
      - ref: messaging.system
        note: MUST be set to `"gcp_pubsub"`.
        examples: ['gcp_pubsub']
      - ref: error.type
        examples: ['NOT_FOUND', 'RESOURCE_EXHAUSTED', 'UNAVAILABLE']
      - ref: messaging.destination.name
        examples: ['MyTopic']
      - ref: messaging.gcp_pubsub.message.ordering_key
        requirement_level:
          conditionally_required: If the message type has an ordering key set.
      - ref: messaging.operation.name
        note: SHOULD be set to `send`.
        examples: ['send']

  - id: span.messaging.gcp_pubsub.send.client
    ref: messaging.send.client
    stability: development
    brief: Describes a producer publishing one or more messages to Google Cloud Pub/Sub.
    attributes:
      - ref: messaging.system
        note: MUST be set to `"gcp_pubsub"`.
        examples: ['gcp_pubsub']
      - ref: error.type
        examples: ['NOT_FOUND', 'RESOURCE_EXHAUSTED', 'UNAVAILABLE']
      - ref: messaging.destination.name
        examples: ['MyTopic']
      - ref: messaging.gcp_pubsub.message.ordering_key
        requirement_level:
          conditionally_required: If the message type has an ordering key set.
      - ref: messaging.operation.name
        note: SHOULD be set to `send`.
        examples: ['send']

  - id: span.messaging.gcp_pubsub.receive.client
    ref: messaging.receive.client
    stability: development
    brief: Describes a consumer receiving one or more messages from Google Cloud Pub/Sub (pull-based).
    attributes:
      - ref: messaging.system
        note: MUST be set to `"gcp_pubsub"`.
        examples: ['gcp_pubsub']
      - ref: error.type
        examples: ['NOT_FOUND', 'RESOURCE_EXHAUSTED', 'UNAVAILABLE']
      - ref: messaging.destination.name
        examples: ['MyTopic']
      - ref: messaging.destination.subscription.name
        brief: "Google Pub/Sub [subscription name](https://cloud.google.com/pubsub/docs/subscription-overview)."
        note: ""
        requirement_level:
          conditionally_required: If applicable.
        sampling_relevant: true
      - ref: messaging.gcp_pubsub.message.delivery_attempt
      - ref: messaging.gcp_pubsub.message.ack_id
      - ref: messaging.operation.name
        note: SHOULD be set to `receive`.
        examples: ['receive']

  - id: span.messaging.gcp_pubsub.process.consumer
    ref: messaging.process.consumer
    stability: development
    brief: Describes a consumer processing one or more messages from Google Cloud Pub/Sub (push-based).
    attributes:
      - ref: messaging.system
        note: MUST be set to `"gcp_pubsub"`.
        examples: ['gcp_pubsub']
      - ref: error.type
        examples: ['NOT_FOUND', 'RESOURCE_EXHAUSTED', 'UNAVAILABLE']
      - ref: messaging.destination.name
        examples: ['MyTopic']
      - ref: messaging.destination.subscription.name
        brief: "Google Pub/Sub [subscription name](https://cloud.google.com/pubsub/docs/subscription-overview)."
        note: ""
        requirement_level:
          conditionally_required: If applicable.
        sampling_relevant: true
      - ref: messaging.gcp_pubsub.message.delivery_attempt
      - ref: messaging.gcp_pubsub.message.ack_id
      - ref: messaging.operation.name
        note: |
          SHOULD be set to `subscribe`, representing the time from after the
          message was received to when it is acknowledged, negatively acknowledged, or expired.
        examples: ['subscribe']

  - id: span.messaging.gcp_pubsub.settle.client
    ref: messaging.settle.client
    stability: development
    brief: Describes settling (ack/nack/modack) one or more Google Cloud Pub/Sub messages.
    attributes:
      - ref: messaging.system
        note: MUST be set to `"gcp_pubsub"`.
        examples: ['gcp_pubsub']
      - ref: error.type
        examples: ['NOT_FOUND', 'RESOURCE_EXHAUSTED', 'UNAVAILABLE']
      - ref: messaging.destination.name
        examples: ['MyTopic']
      - ref: messaging.destination.subscription.name
        brief: "Google Pub/Sub [subscription name](https://cloud.google.com/pubsub/docs/subscription-overview)."
        note: ""
        requirement_level:
          conditionally_required: If applicable.
        sampling_relevant: true
      - ref: messaging.gcp_pubsub.message.delivery_attempt
      - ref: messaging.gcp_pubsub.message.ack_deadline
      - ref: messaging.gcp_pubsub.message.ack_id
      - ref: messaging.operation.name
        note: |
          Has the following well-known values for Google Cloud Pub/Sub settlement.
          If one of them applies, then the respective value MUST be used; otherwise, a custom value MAY be used.

          - `ack` and `nack` for acknowledging or negatively acknowledging a message
          - `modack` for extending the lease for a single message or batch of messages
        examples: ['ack', 'nack', 'modack']
